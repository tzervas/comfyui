events {
    worker_connections 1024;
}

http {
    # SSL configuration
    ssl_certificate /etc/ssl/certs/localhost/cert.pem;
    ssl_certificate_key /etc/ssl/certs/localhost/key.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Performance optimizations
    upstream ollama_backend {
        server 192.168.1.99:11434;
        keepalive 32;
    }

    upstream comfyui_backend {
        server 192.168.1.99:18188;
        keepalive 32;
    }

    upstream code_executor_backend {
        server code_executor:5000;
        keepalive 16;
    }

    upstream langchain_backend {
        server langchain:8000;
        keepalive 32;
    }

    upstream langflow_backend {
        server langflow:7860;
        keepalive 32;
    }

    upstream model_vault_backend {
        server model-vault:8080;
        keepalive 16;
    }

    # Caching
    proxy_cache_path /tmp/nginx_cache levels=1:2 keys_zone=cache_zone:10m max_size=1g inactive=60m use_temp_path=off;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    server {
        listen 80;
        # Ollama API proxy

        # Ollama API proxy
        location /ollama/ {
            proxy_pass http://ollama_backend/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            auth_basic "Ollama Access Restricted";
            auth_basic_user_file /etc/nginx/.htpasswd;
        }

        # ComfyUI UI proxy with websocket support
        location /comfyui/ {
            proxy_pass http://comfyui_backend/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400;  # For long-running ComfyUI tasks
            auth_basic "ComfyUI Access Restricted";
            auth_basic_user_file /etc/nginx/.htpasswd;
        }

        # LangChain API proxy
        location /langchain/ {
            proxy_pass http://langchain:8000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 90s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;
            auth_basic "LangChain Access Restricted";
            auth_basic_user_file /etc/nginx/.htpasswd;
        }

        # Code Executor API proxy
        location /code-executor/ {
            proxy_pass http://code_executor_backend/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 30s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
            auth_basic "Code Executor Access Restricted";
            auth_basic_user_file /etc/nginx/.htpasswd;
        }

        # LangFlow UI proxy - DISABLED due to container issues
        # location /langflow/ {
        #     proxy_pass http://langflow:7860/;
        #     proxy_set_header Host $host;
        #     proxy_set_header X-Real-IP $remote_addr;
        #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        #     proxy_set_header X-Forwarded-Proto $scheme;
        #     auth_basic "LangFlow Access Restricted";
        #     auth_basic_user_file /etc/nginx/.htpasswd;
        # }

        # Model Vault API proxy
        location /register {
            proxy_pass http://model_vault_backend/register;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /discover {
            proxy_pass http://model_vault_backend/discover;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    server {
        listen 443 ssl;

        # Ollama API proxy
        location /ollama/ {
            proxy_pass http://ollama_backend/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            auth_basic "Ollama Access Restricted";
            auth_basic_user_file /etc/nginx/.htpasswd;
        }

        # ComfyUI UI proxy with websocket support
        location /comfyui/ {
            proxy_pass http://comfyui_backend/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400;  # For long-running ComfyUI tasks
            auth_basic "ComfyUI Access Restricted";
            auth_basic_user_file /etc/nginx/.htpasswd;
        }

        # LangChain API proxy
        location /langchain/ {
            proxy_pass http://langchain:8000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 90s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;
            auth_basic "LangChain Access Restricted";
            auth_basic_user_file /etc/nginx/.htpasswd;
        }

        # Code Executor API proxy
        location /code-executor/ {
            proxy_pass http://code_executor_backend/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 30s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
            auth_basic "Code Executor Access Restricted";
            auth_basic_user_file /etc/nginx/.htpasswd;
        }

        # LangFlow UI proxy - DISABLED due to container issues
        # location /langflow/ {
        #     proxy_pass http://langflow:7860/;
        #     proxy_set_header Host $host;
        #     proxy_set_header X-Real-IP $remote_addr;
        #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        #     proxy_set_header X-Forwarded-Proto $scheme;
        #     auth_basic "LangFlow Access Restricted";
        #     auth_basic_user_file /etc/nginx/.htpasswd;
        # }
    }
}
services:
  ollama:
    build:
      context: .
      dockerfile: Dockerfile.ollama
    container_name: ollama
    volumes:
      - ollama_data:/root/.ollama
      - ./ollama-init.sh:/app/ollama-init.sh:ro
      - ./healthcheck-ollama.sh:/app/healthcheck-ollama.sh:ro
      - tmp_trackers:/tmp/comfyui-ollama
    ports:
      - "${OLLAMA_PORT:-11434}:11434"  # Internal only, configurable port
    environment:
      - OLLAMA_HOST=0.0.0.0:${OLLAMA_PORT:-11434}
      - OLLAMA_ORIGINS=${OLLAMA_ORIGINS:-*}
      - HTTPS_PROXY=${HTTPS_PROXY:-}
      - OLLAMA_DEBUG=${OLLAMA_DEBUG:-false}
      - OLLAMA_MODELS=${OLLAMA_MODELS:-gemma3:1b,deepseek-r1:1.5b,smollm2:1.7b,dolphin-llama3:8b,wizard-vicuna-uncensored:7b,llama2-uncensored:7b,llava:7b,moondream:1.8b,llama3.1:8b,mistral:7b,gemma:7b}
      - TMPDIR=/tmp/comfyui-ollama
      - MODEL_VAULT_TOKEN=${MODEL_VAULT_TOKEN}
      - MODEL_VAULT_URL=http://model-vault:8080
      - HF_TOKEN=${HF_TOKEN}
    # deploy:  # GPU support for NVIDIA 590.44.x drivers - disabled for CPU testing
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: ${GPU_DRIVER:-nvidia}
    #           count: ${GPU_COUNT:-all}
    #           capabilities: [gpu]
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 8G
        reservations:
          cpus: '2.0'
          memory: 4G
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    entrypoint: ["/bin/bash", "-c"]
    command: "/app/ollama-init.sh && ollama serve"
    healthcheck:
      test: ["CMD", "/app/healthcheck-ollama.sh"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    restart: unless-stopped

  comfyui:
    image: ${COMFYUI_IMAGE:-ghcr.io/ai-dock/comfyui:latest}  # GPU-enabled image
    container_name: comfyui
    volumes:
      - comfyui_models:/opt/storage
      - comfyui_outputs:/opt/ComfyUI/output  # For generated content
      - comfyui_user_profiles:/opt/ComfyUI/user_profiles  # User-specific configs
      - ./comfyui-init.sh:/app/comfyui-init.sh:ro
      - ./healthcheck-comfyui.sh:/app/healthcheck-comfyui.sh:ro
      - tmp_trackers:/tmp/comfyui-ollama
    ports:
      - "${COMFYUI_PORT:-8188}:18188"  # ComfyUI runs on 18188 internally
    environment:
      - COMFYUI_ARGS=--listen 0.0.0.0 --port 18188 --enable-cors-header ${COMFYUI_EXTRA_ARGS:-}
      - HF_TOKEN=${HF_TOKEN:-}
      - COMFYUI_PATH=${COMFYUI_PATH:-/opt/ComfyUI}
      - TMPDIR=/tmp/comfyui-ollama
    # deploy:  # GPU support for NVIDIA 590.44.x drivers - disabled for CPU testing
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: ${GPU_DRIVER:-nvidia}
    #           count: ${GPU_COUNT:-all}
    #           capabilities: [gpu]
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 8G
        reservations:
          cpus: '2.0'
          memory: 4G
    healthcheck:
      test: ["CMD", "/app/healthcheck-comfyui.sh"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    container_name: nginx
    ports:
      - "${NGINX_PORT:-80}:80"  # HTTP
      - "${NGINX_SSL_PORT:-443}:443"  # HTTPS
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ${HTPASSWD_FILE:-./.htpasswd}:/etc/nginx/.htpasswd:ro  # Optional auth file
      - ./ssl:/etc/ssl/certs/localhost:ro  # SSL certificates
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.2'
          memory: 128M
    depends_on:
      - ollama
      - comfyui
    restart: unless-stopped

  langchain:
    build:
      context: .
      dockerfile: Dockerfile.langchain
    container_name: langchain
    volumes:
      - langchain_vectorstore:/app/vectorstore
      - ./langchain_app.py:/app/langchain_app.py:ro
      - ./healthcheck-langchain.sh:/app/healthcheck-langchain.sh:ro
      - tmp_trackers:/tmp/comfyui-ollama
    ports:
      - "${LANGCHAIN_PORT:-8000}:8000"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - TMPDIR=/tmp/comfyui-ollama
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '1.0'
          memory: 1G
    healthcheck:
      test: ["CMD", "/app/healthcheck-langchain.sh"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    depends_on:
      - ollama
    restart: unless-stopped

  langflow:
    image: langflowai/langflow:1.0.4
    container_name: langflow
    user: root
    ports:
      - "${LANGFLOW_PORT:-7860}:7860"
    environment:
      - LANGFLOW_AUTO_LOGIN=False
      - LANGFLOW_SUPERUSER=admin
      - LANGFLOW_SUPERUSER_PASSWORD=admin
      - LANGFLOW_CONFIG_DIR=${LANGFLOW_CONFIG_DIR:-/app/data/langflow}
      - LANGFLOW_DATABASE_URL=sqlite:///./langflow.db
      - XDG_CACHE_HOME=/tmp/langflow-cache
      - TMPDIR=/tmp/comfyui-ollama
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '1.0'
          memory: 1G
    volumes:
      - langflow_data:/app/data
      - ./langflow-init.sh:/app/langflow-init.sh:ro
      - ./healthcheck-langflow.sh:/app/healthcheck-langflow.sh:ro
      - tmp_trackers:/tmp/comfyui-ollama
      # - ./langflow-entrypoint.sh:/entrypoint.sh:ro
    tmpfs:
      - /tmp:exec,size=1G
    # entrypoint: ["/entrypoint.sh"]
    # command: ["python", "-m", "langflow", "run"]
    healthcheck:
      test: ["CMD", "/app/healthcheck-langflow.sh"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
    depends_on:
      - ollama
      - langchain
    restart: unless-stopped

  code_executor:
    build:
      context: .
      dockerfile: Dockerfile.code_executor
    container_name: code_executor
    volumes:
      - tmp_trackers:/tmp/comfyui-ollama
    ports:
      - "${CODE_EXECUTOR_PORT:-5000}:5000"
    environment:
      - TMPDIR=/tmp/comfyui-ollama
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.2'
          memory: 128M
    command: ["python", "-m", "http.server", "5000"]
    cap_drop: [ALL]
    read_only: true
    tmpfs:
      - /tmp:exec,size=100m
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      - ollama
    restart: unless-stopped

  # Model Vault - Secure model storage and serving (Future Enhancement - WIP)
  # model-vault:
  #   build:
  #     context: .
  #     dockerfile: model-vault-Dockerfile
  #   container_name: model-vault
  #   volumes:
  #     - model_vault_data:/var/lib/model-vault
  #   ports:
  #     - "${MODEL_VAULT_PORT:-8080}:8080"
  #   environment:
  #     - MODEL_VAULT_STORAGE_PATH=/var/lib/model-vault
  #     - MODEL_VAULT_AUTH_TOKEN=${MODEL_VAULT_TOKEN}
  #   deploy:
  #     resources:

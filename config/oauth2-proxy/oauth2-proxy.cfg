# OAuth2 Proxy config (TOML-like).
# This repo uses env vars for provider/client secrets.
# This file is used to support baseline allowlists cleanly.

proxy_prefix = "/oauth2"
upstreams = ["file:///dev/null"]
reverse_proxy = true
set_xauthrequest = true
skip_provider_button = true

# Healthcheck endpoint exposed through nginx at /oauth2/ping
ping_path = "/oauth2/ping"

# Allow any email by default (open login). Set a domain list if desired.
email_domains = ["*"]

# Optional baseline allowlist (uncomment or have bootstrap enable it):
# authenticated_emails_file = "/etc/oauth2-proxy/allowed_emails.txt"

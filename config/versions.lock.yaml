# Pin semver tags here; switch to digests later if needed.
docker_images:
  openwebui:
    image: ghcr.io/open-webui/open-webui
    tag: "git-ccd3295-cuda126"  # Pinned git commit for CUDA 12.6
  pipelines:
    image: ghcr.io/open-webui/pipelines
    tag: "git-039f9c5-cuda"  # Pinned git commit for CUDA
  comfyui:
    image: "<local-build>"  # Self-built from official v0.7.0
    tag: "v0.7.0"
    source: "https://github.com/comfyanonymous/ComfyUI/releases/tag/v0.7.0"
    dockerfile: "Dockerfile.comfyui"
  ollama:
    image: ollama/ollama
    tag: "0.5.8"  # Latest stable as of 2026-01-02
  lollms:
    image: "<local-build>"  # Phase 2: main branch commit SHA
    tag: "<TBD>"
    source: "https://github.com/ParisNeo/lollms-webui"
    dockerfile: "Dockerfile.lollms"
    notes: "Deferred to Phase 2 after Ollama+ComfyUI validation"

git_repos:
  comfyui_manager:
    repo: https://github.com/ltdrdata/ComfyUI-Manager.git
    commit: "<set-commit-sha>"
  comfyui_llm_party:
    repo: https://github.com/city96/ComfyUI-LLM-Party.git
    commit: "<set-commit-sha>"
  comfyui_copilot:
    repo: https://github.com/pashpashpash/vault-copilot.git
    commit: "<set-commit-sha>"
  openwebui_tools:
    repo: https://github.com/open-webui/open-webui.git
    path: tools
    commit: "<set-commit-sha>"

python:
  # For custom-built images (langchain, code_executor, etc.) pin every dep here
  constraints: "<set-constraints-file-or-list>"

models:
  ollama:
    - name: gemma3
      tag: 1b
    - name: deepseek-r1
      tag: 1.5b
    - name: tinyllama
      tag: latest  # replace with explicit tag when selected
  comfyui:
    # Add video/audio model assets and their source/version here (vae, checkpoints, motion models)
    - name: "<model-name>"
      version: "<version-or-date>"
      source: "<url or registry>"

validated_on: "2026-01-02"
notes: |
  Phase 1: Custom ComfyUI v0.7.0 + pinned OpenWebUI/Pipelines git tags
  Resource budget: 12 cores total for single-node GPU stack
  Phase 2: LoLLMs main-branch integration after validation

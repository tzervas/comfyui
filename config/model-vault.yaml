# Model Vault Configuration
storage:
  path: "/var/lib/model-vault"
  max_size_gb: 500

server:
  host: "0.0.0.0"
  port: 8080
  auth_token: "CHANGE_ME"  # Override via env: MODEL_VAULT_TOKEN

models:
  registries:
    - name: "vault"
      url: "http://model-vault:8080"
      priority: 1
      auth_required: true

security:
  vault:
    level: "local"
    encryption: false
  ollama:
    level: "trusted"
    encryption: false
  huggingface:
    level: "external"
    encryption: true
    verify_signatures: true

database:
  url: "sqlite:///var/lib/model-vault/model-vault.db"

# K8s-ready compose stack for homelab (internal service discovery via Docker DNS)
name: comfyui-homelab

services:
  # Rust API/Registry Service
  model-vault:
    build:
      context: .
      dockerfile: model-vault-Dockerfile
    volumes:
      - model_vault_data:/var/lib/model-vault
      - ./config/model-vault.yaml:/app/config/model-vault.yaml:ro
    environment:
      - MODEL_VAULT_TOKEN=${MODEL_VAULT_TOKEN}  # TODO: migrate to Docker secret for K8s
      - REGISTRY_SECRET=${REGISTRY_SECRET}      # TODO: migrate to Docker secret for K8s
      - MODEL_VAULT_STORAGE__PATH=/var/lib/model-vault
      - MODEL_VAULT_DATABASE__URL=sqlite:/var/lib/model-vault/model-vault.db
    networks:
      - comfyui-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
    restart: unless-stopped

  # PostgreSQL database for Keycloak
  keycloak-db:
    image: postgres:16-alpine
    profiles: ["sso"]
    networks:
      - comfyui-net
    environment:
      - POSTGRES_DB=${KEYCLOAK_DB_NAME:-keycloak}
      - POSTGRES_USER=${KEYCLOAK_DB_USER:-keycloak}
      - POSTGRES_PASSWORD=${KEYCLOAK_DB_PASSWORD:-keycloak}
    volumes:
      - keycloak_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${KEYCLOAK_DB_USER:-keycloak} -d ${KEYCLOAK_DB_NAME:-keycloak}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # Keycloak Identity Provider
  keycloak:
    image: quay.io/keycloak/keycloak:24.0.5
    profiles: ["sso"]
    networks:
      - comfyui-net
    command: ["start-dev", "--import-realm"]
    depends_on:
      - keycloak-db
    volumes:
      - ./config/keycloak:/opt/keycloak/data/import:ro
    environment:
      - KC_DB=postgres
      - KC_DB_URL_HOST=keycloak-db
      - KC_DB_URL_DATABASE=${KEYCLOAK_DB_NAME:-keycloak}
      - KC_DB_USERNAME=${KEYCLOAK_DB_USER:-keycloak}
      - KC_DB_PASSWORD=${KEYCLOAK_DB_PASSWORD:-keycloak}
      - KC_HTTP_ENABLED=true
      - KC_HTTP_RELATIVE_PATH=/keycloak
      - KC_PROXY=edge
      - KC_PROXY_HEADERS=xforwarded
      - KC_HOSTNAME=https://${STACK_FQDN}:8444
      - KC_HOSTNAME_PATH=/keycloak
      - KC_HOSTNAME_BACKCHANNEL_DYNAMIC=true
      - KEYCLOAK_ADMIN=${KEYCLOAK_BOOTSTRAP_ADMIN_USERNAME:-kcadmin}
      - KEYCLOAK_ADMIN_PASSWORD=${KEYCLOAK_BOOTSTRAP_ADMIN_PASSWORD:-}
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/9000 && echo -e 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\n\\r\\n' >&3 && cat <&3 | grep -q '200 OK'"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 90s
    restart: unless-stopped

  # OAuth2 proxy for SSO (internal only, no host ports)
  oauth2-proxy:
    image: quay.io/oauth2-proxy/oauth2-proxy:v7.6.0
    profiles: ["sso"]
    networks:
      - comfyui-net
    command: ["--config=/etc/oauth2-proxy/oauth2-proxy.cfg"]
    volumes:
      - ./config/oauth2-proxy/oauth2-proxy.cfg:/etc/oauth2-proxy/oauth2-proxy.cfg:ro
      - ./config/oauth2-proxy/allowed_emails.txt:/etc/oauth2-proxy/allowed_emails.txt:ro
    environment:
      - OAUTH2_PROXY_PROVIDER=oidc
      - OAUTH2_PROXY_OIDC_ISSUER_URL=http://keycloak:8080/keycloak/realms/comfyui
      - OAUTH2_PROXY_CLIENT_ID=${OAUTH2_PROXY_CLIENT_ID:-}
      - OAUTH2_PROXY_CLIENT_SECRET=${OAUTH2_PROXY_CLIENT_SECRET:-}
      - OAUTH2_PROXY_COOKIE_SECRET=${OAUTH2_PROXY_COOKIE_SECRET:-}
      - OAUTH2_PROXY_REDIRECT_URL=${OAUTH2_PROXY_REDIRECT_URL:-}
      - OAUTH2_PROXY_HTTP_ADDRESS=0.0.0.0:4180
      - OAUTH2_PROXY_INSECURE_OIDC_ALLOW_UNVERIFIED_EMAIL=true
      - OAUTH2_PROXY_INSECURE_OIDC_SKIP_ISSUER_VERIFICATION=true
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:4180/oauth2/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      - keycloak
    restart: unless-stopped

  # Optional SSL/TLS certificate automation
  cert-init:
    # K8s migration: Replace with cert-manager ClusterIssuer/Certificate resources
    build:
      context: .
      dockerfile: Dockerfile.certman
    profiles: ["ssl-auto"]
    volumes:
      - ./ssl:/ssl
    environment:
      - SSL_AUTO_PROVISION=${SSL_AUTO_PROVISION:-0}
      - SSL_KEY_TYPE=${SSL_KEY_TYPE:-ecdsa-p384}
      - SSL_ROOT_VALIDITY_DAYS=${SSL_ROOT_VALIDITY_DAYS:-3650}
      - SSL_INTERMEDIATE_VALIDITY_DAYS=${SSL_INTERMEDIATE_VALIDITY_DAYS:-1825}
      - SSL_CERT_VALIDITY_DAYS=${SSL_CERT_VALIDITY_DAYS:-397}
      - SSL_DOMAIN=${SSL_DOMAIN:-*.homelab.lan}
      - SSL_AUTO_TRUST=${SSL_AUTO_TRUST:-0}
    command: |
      sh -c '
        if [ "$SSL_AUTO_PROVISION" = "1" ]; then
          certman init-ca --key-type "$SSL_KEY_TYPE" \
            --root-validity-days "$SSL_ROOT_VALIDITY_DAYS" \
            --intermediate-validity-days "$SSL_INTERMEDIATE_VALIDITY_DAYS" || exit 0
          certman generate-cert --domain "$SSL_DOMAIN" \
            --validity-days "$SSL_CERT_VALIDITY_DAYS"
          if [ "$SSL_AUTO_TRUST" = "1" ]; then
            certman install-trust
          fi
        fi
      '

  # Ingress gateway (only service with host port exposure)
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "${NGINX_PORT:-8081}:80"      # HTTP - only exposed port
      - "${NGINX_SSL_PORT:-8444}:443"  # HTTPS - only exposed port
    volumes:
      - ./nginx.conf.template:/etc/nginx/nginx.conf.template:ro
      - ./tools/nginx-envsubst.sh:/docker-entrypoint.d/99-nginx-envsubst.sh:ro
      - ./tools/healthcheck-ingress.sh:/app/healthcheck-ingress.sh:ro
      - ${HTPASSWD_FILE:-./.htpasswd}:/etc/nginx/.htpasswd:ro
      - ./ssl:/etc/ssl/certs/localhost:ro
    networks:
      - comfyui-net
    environment:
      - STACK_FQDN=${STACK_FQDN:-_}
      - OLLAMA_UPSTREAM=${OLLAMA_UPSTREAM:-ollama:11434}
      - COMFYUI_UPSTREAM=${COMFYUI_UPSTREAM:-comfyui:18188}
      - OAUTH2_PROXY_UPSTREAM=${OAUTH2_PROXY_UPSTREAM:-oauth2-proxy:4180}
      - PROBE_OLLAMA=${PROBE_OLLAMA:-0}
      - PROBE_COMFYUI=${PROBE_COMFYUI:-0}
      - MTLS_VERIFY=${MTLS_VERIFY:-off}
      - SSO_ENABLED=${SSO_ENABLED:-0}
      - KEYCLOAK_ENABLED=${KEYCLOAK_ENABLED:-0}
      - MODEL_VAULT_MODE=${MODEL_VAULT_MODE:-local}
      - REGISTRY_SECRET=${REGISTRY_SECRET}  # For nginx if checks
    depends_on:
      - model-vault
    healthcheck:
      test: ["CMD", "/app/healthcheck-ingress.sh"]
      interval: 15s
      timeout: 8s
      retries: 20
      start_period: 30s
    restart: unless-stopped

  # LangChain RAG service (internal only)
  langchain:
    build:
      context: .
      dockerfile: Dockerfile.langchain
    networks:
      - comfyui-net
    volumes:
      - langchain_vectorstore:/app/vectorstore
      - ./langchain_app.py:/app/langchain_app.py:ro
      - ./healthcheck-langchain.sh:/app/healthcheck-langchain.sh:ro
      - tmp_trackers:/tmp/comfyui-ollama
    environment:
      - OLLAMA_BASE_URL=http://akula-prime:11434  # Remote Ollama (can be parameterized)
      - TMPDIR=/tmp/comfyui-ollama
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '1.0'
          memory: 1G
    healthcheck:
      test: ["CMD", "/app/healthcheck-langchain.sh"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    depends_on:
      - model-vault
    restart: unless-stopped

  # LangFlow UI (internal only)
  langflow:
    image: langflowai/langflow:1.0.4
    user: root
    networks:
      - comfyui-net
    environment:
      - LANGFLOW_AUTO_LOGIN=False
      - LANGFLOW_SUPERUSER=admin
      - LANGFLOW_SUPERUSER_PASSWORD=admin
      - LANGFLOW_CONFIG_DIR=${LANGFLOW_CONFIG_DIR:-/app/data/langflow}
      - LANGFLOW_DATABASE_URL=sqlite:///./langflow.db
      - XDG_CACHE_HOME=/tmp/langflow-cache
      - TMPDIR=/tmp/comfyui-ollama
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '1.0'
          memory: 1G
    volumes:
      - langflow_data:/app/data
      - ./tools/legacy/langflow-init.sh:/app/langflow-init.sh:ro
      - ./healthcheck-langflow.sh:/app/healthcheck-langflow.sh:ro
      - tmp_trackers:/tmp/comfyui-ollama
    tmpfs:
      - /tmp:exec,size=1G
    healthcheck:
      test: ["CMD", "/app/healthcheck-langflow.sh"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
    depends_on:
      - model-vault
    restart: unless-stopped

  # Code executor sandbox (internal only)
  code_executor:
    build:
      context: .
      dockerfile: Dockerfile.code_executor
    networks:
      - comfyui-net
    volumes:
      - tmp_trackers:/tmp/comfyui-ollama
    environment:
      - TMPDIR=/tmp/comfyui-ollama
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.2'
          memory: 128M
    command: ["python", "-m", "http.server", "5000"]
    cap_drop: [ALL]
    read_only: true
    tmpfs:
      - /tmp:exec,size=100m
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      - model-vault
    restart: unless-stopped

# Custom bridge network for internal service discovery (K8s migration prep)
networks:
  comfyui-net:
    driver: bridge
    name: comfyui-homelab-net

# Persistent volumes (use external volume for model-vault to match K8s PVC pattern)
volumes:
  model_vault_data:
    external: true
    name: comfyui-homelab-model-vault-data  # External volume for persistence across restarts
  keycloak_db_data:
  langchain_vectorstore:
  langflow_data:
  tmp_trackers: